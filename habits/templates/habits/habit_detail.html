<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ habit.name }} - Details</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4 py-3">
<a class="navbar-brand text-white">🎯 Habit Tracker</a>
</nav>
<div class="container mt-4">
<div class="card shadow mb-4">
<div class="card-body p-4">
<h2 class="fw-bold">{{ habit.name }}</h2>
<p class="text-muted">{{ habit.description }}</p>
<div class="alert alert-warning d-inline-block">🔥 Current Streak: <strong>{{ streak }} days</strong></div>
</div>
</div>
<h5 class="fw-bold mb-3">Last 30 Days History</h5>
<div class="card shadow">
<div class="card-body p-0">
<table class="table table-bordered mb-0">
<thead class="table-dark">
<tr><th>Date</th><th>Status</th></tr>
</thead>
<tbody>
{% for log in logs %}
<tr class="{% if log.completed %}table-success{% else %}table-danger{% endif %}">
<td>{{ log.date }}</td>
<td>{% if log.completed %}✅ Done{% else %}❌ Missed{% endif %}</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</div>
<a href="/" class="btn btn-secondary mt-4">← Back to Dashboard</a>
</div>
</body>
</html>
