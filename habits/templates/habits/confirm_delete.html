<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Habit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f0f2f5; font-family: Segoe UI, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
.navbar { background: linear-gradient(135deg, #3498db, #000000) !important; }
.card { border: none; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
.delete-icon { font-size: 4rem; text-align: center; margin-bottom: 1rem; }
h4 { font-weight: 700; color: #1f2937; text-align: center; }
.habit-name { color: #ef4444; font-weight: 700; }
.subtitle { text-align: center; color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; }
.btn-yes { background: #ef4444; border: none; border-radius: 10px; padding: 10px 30px; font-weight: 600; color: white; }
.btn-yes:hover { background: #dc2626; color: white; }
.btn-no { background: #f3f4f6; border: none; border-radius: 10px; padding: 10px 30px; font-weight: 600; color: #374151; }
.btn-no:hover { background: #e5e7eb; color: #374151; }
</style>
</head>
<body>
<nav class="navbar navbar-dark px-3 py-3">
    <a class="navbar-brand text-white fw-bold">🎯 Habit Tracker</a>
    <a href="/" class="btn btn-outline-light btn-sm">← Dashboard</a>
</nav>
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-5 col-sm-8">
<div class="card p-4">
    <div class="delete-icon">🗑️</div>
    <h4>Delete <span class="habit-name">"{{ habit.name }}"</span>?</h4>
    <p class="subtitle mt-2">Ye habit hide ho jayegi. History safe rahegi.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-3 justify-content-center">
            <button type="submit" class="btn btn-yes">Yes, Delete</button>
            <a href="/" class="btn btn-no">Cancel</a>
        </div>
    </form>
</div>
</div>
</div>
</div>
</body>
</html>
