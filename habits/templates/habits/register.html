<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Habit Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #3498db, #000000); min-height: 100vh; display: flex; align-items: center; justify-content: center;  }
.card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.card-body { padding: 3rem !important; }
.brand-icon { font-size: 3rem; display: block; text-align: center; margin-bottom: 0.5rem; }
h3 { font-weight: 700; color: #2d3748; text-align: center; margin-bottom: 0.2rem; }
.subtitle { text-align: center; color: #718096; font-size: 0.9rem; margin-bottom: 2rem; }
.form-control { border-radius: 10px; border: 2px solid #e2e8f0; padding: 0.75rem 1rem; }
.form-control:focus { border-color: linear-gradient(135deg, #3498db, #000000); box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
label { font-weight: 600; color: #4a5568; }
.btn-register { background: linear-gradient(135deg, #3498db, #000000); border: none; border-radius: 10px; padding: 0.75rem; font-size: 1rem; font-weight: 600; }
.login-link { text-align: center; margin-top: 1.5rem; color: #718096; font-size: 0.9rem; }
.login-link a { color: linear-gradient(135deg, #3498db, #000000); font-weight: 600; text-decoration: none; }
.helptext { font-size: 0.8rem; color: #718096; }
.errorlist { background: #fff5f5; border: 1px solid #fc8181; border-radius: 8px; padding: 0.75rem 1rem; color: #c53030; font-size: 0.875rem; list-style: none; margin-bottom: 1rem; }
</style>
</head>
<body>
<div style="position:fixed; top:20px; left:20px; z-index:999;">
    <a href="/" style="background:rgba(255,255,255,0.2); color:white; border:2px solid white; border-radius:25px; padding:8px 20px; text-decoration:none; font-weight:600; font-size:0.9rem; backdrop-filter:blur(10px);">← Back to Home</a>
</div>
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card">
<div class="card-body">
<span class="brand-icon">🎯</span>
<h3>Create Account</h3>
<p class="subtitle">Start tracking your habits today!</p>
<form method="post">
{% csrf_token %}
{% if form.errors %}
<ul class="errorlist">
{% for field in form %}{% for error in field.errors %}<li>{{ error }}</li>{% endfor %}{% endfor %}
</ul>
{% endif %}
<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" placeholder="Choose username" required>
</div>
<div class="mb-3">
<label>Password</label>
<input type="password" name="password1" class="form-control" placeholder="Create password" required>
<small class="helptext">Min 8 characters</small>
</div>
<div class="mb-3">
<label>Confirm Password</label>
<input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
</div>
<button type="submit" class="btn btn-register btn-primary w-100">Create Account</button>
</form>
<p class="login-link">Already have account? <a href="/login/">Login here</a></p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
