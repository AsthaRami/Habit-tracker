<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Habit Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #3498db, #000000); min-height: 100vh; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; margin: 0; padding: 2rem 0; }
.card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.card-body { padding: 3rem !important; }
.brand-icon { font-size: 3rem; display: block; text-align: center; margin-bottom: 0.5rem; }
h3 { font-weight: 700; color: #2d3748; text-align: center; margin-bottom: 0.2rem; }
.subtitle { text-align: center; color: #718096; font-size: 0.9rem; margin-bottom: 2rem; }
.form-control { border-radius: 10px; border: 2px solid #e2e8f0; padding: 0.75rem 1rem; font-size: 0.95rem; transition: all 0.3s; }
.form-control:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.2); }
label { font-weight: 600; color: #4a5568; margin-bottom: 0.4rem; display: block; }
.btn-login { background: linear-gradient(135deg, #3498db, #000000); border: none; border-radius: 10px; padding: 0.75rem; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s; margin-top: 0.5rem; }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(52,152,219,0.5); }
.register-link { text-align: center; margin-top: 1.5rem; color: #718096; font-size: 0.9rem; }
.register-link a { color: #3498db; font-weight: 600; text-decoration: none; }
.register-link a:hover { text-decoration: underline; }
.errorlist { background: #fff5f5; border: 1px solid #fc8181; border-radius: 8px; padding: 0.75rem 1rem; color: #c53030; font-size: 0.875rem; list-style: none; margin-bottom: 1rem; }
.eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; background:none; border:none; padding:0; color:#718096; font-size:0.85rem; font-weight:600; }
.eye-btn:hover { color: #3498db; }
</style>
</head>
<body>

<div style="position:fixed; top:20px; left:20px; z-index:999;">
    <a href="/" style="background:rgba(255,255,255,0.2); color:white; border:2px solid white; border-radius:25px; padding:8px 20px; text-decoration:none; font-weight:600; font-size:0.9rem; backdrop-filter:blur(10px);">← Back to Home</a>
</div>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5 col-lg-4">
<div class="card">
<div class="card-body">

<span class="brand-icon">🎯</span>
<h3>Habit Tracker</h3>
<p class="subtitle">Welcome back! Please login.</p>

<form method="post">
{% csrf_token %}
{% if form.errors %}
<ul class="errorlist">
    <li>Invalid username or password.</li>
</ul>
{% endif %}

<div class="mb-3">
    <label>Username</label>
    <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus>
</div>

<div class="mb-3">
    <label>Password</label>
    <div style="position:relative;">
        <input type="password" name="password" class="form-control" placeholder="Enter password" id="loginPass">
        <button type="button" class="eye-btn" onclick="togglePass('loginPass', this)">Show</button>
    </div>
</div>

<button type="submit" class="btn btn-login btn-primary w-100">Login →</button>
</form>

<p class="register-link">No account? <a href="/register/">Register here</a></p>

</div>
</div>
</div>
</div>
</div>

<script>
function togglePass(id, el) {
    var input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        el.textContent = 'Hide';
    } else {
        input.type = 'password';
        el.textContent = 'Show';
    }
}
</script>
</body>
</html>
